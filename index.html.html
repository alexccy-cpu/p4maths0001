<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小數點字卡排列</title>
    <!-- 引入 React 核心函式庫 -->
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 讓瀏覽器可以編譯 JSX -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- 引入 Tailwind CSS 作為樣式框架 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #f0fdf4; 
            font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; 
        }
        /* 卡片陰影效果，增添立體可愛感 */
        .card { 
            box-shadow: 4px 4px 0px #86efac; 
        }
        /* 隱藏輸入框的上下箭頭 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React 應用程式代碼 -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [digits, setDigits] = useState([]);
            const [displayCards, setDisplayCards] = useState([]); // 新增：用於顯示打亂後的卡牌
            const [questions, setQuestions] = useState([
                { id: 'a', size: 'max', decimal: 1 },
                { id: 'b', size: 'min', decimal: 2 }
            ]);
            const [userAnswers, setUserAnswers] = useState({ a: '', b: '' });
            const [feedback, setFeedback] = useState(null);
            const [score, setScore] = useState(0);
            const [isCorrectlyAnswered, setIsCorrectlyAnswered] = useState(false);

            // 產生新題目
            const generateQuestion = () => {
                let nums = [];
                // 隨機抽取3個不重複的數字 (0-9)
                while(nums.length < 3) {
                    let r = Math.floor(Math.random() * 10);
                    if(!nums.includes(r)) nums.push(r);
                }
                
                setDigits(nums);

                // 將小數點加入陣列並隨機打亂位置
                let cards = [...nums, '.'];
                cards.sort(() => 0.5 - Math.random());
                setDisplayCards(cards);

                const allConfigs = [
                    { size: 'max', decimal: 1 },
                    { size: 'max', decimal: 2 },
                    { size: 'min', decimal: 1 },
                    { size: 'min', decimal: 2 }
                ];
                // 隨機洗牌並抽出兩題不重複的題型
                const shuffled = allConfigs.sort(() => 0.5 - Math.random());
                setQuestions([
                    { id: 'a', ...shuffled[0] },
                    { id: 'b', ...shuffled[1] }
                ]);
                
                setUserAnswers({ a: '', b: '' });
                setFeedback(null);
                setIsCorrectlyAnswered(false);
            };

            // 初始載入時產生第一題
            useEffect(() => {
                generateQuestion();
            }, []);

            // 計算正確答案
            const getCorrectAnswer = (q) => {
                // 先將數字由小到大或由大到小排序
                let sorted = [...digits].sort((a, b) => q.size === 'max' ? b - a : a - b);
                
                // 處理首位為0的特殊情況（例如：最小的一位小數，不能是 03.4，必須是 30.4）
                if (q.size === 'min' && q.decimal === 1 && sorted[0] === 0) {
                    let temp = sorted[0];
                    sorted[0] = sorted[1];
                    sorted[1] = temp;
                }

                // 根據要求插入小數點
                if (q.decimal === 1) {
                    return `${sorted[0]}${sorted[1]}.${sorted[2]}`;
                } else {
                    return `${sorted[0]}.${sorted[1]}${sorted[2]}`;
                }
            };

            // 檢查答案
            const checkAnswer = () => {
                if (!userAnswers.a.trim() || !userAnswers.b.trim()) {
                    setFeedback({ isCorrect: false, msg: '⚠️ 請完成兩道題目喔！' });
                    return;
                }
                const correctA = getCorrectAnswer(questions[0]);
                const correctB = getCorrectAnswer(questions[1]);
                
                const isCorrectA = parseFloat(userAnswers.a) === parseFloat(correctA) && userAnswers.a.trim() === correctA;
                const isCorrectB = parseFloat(userAnswers.b) === parseFloat(correctB) && userAnswers.b.trim() === correctB;
                
                if (isCorrectA && isCorrectB) {
                    setFeedback({ isCorrect: true, msg: '✨ 太棒了！兩題都答對了！ ✨' });
                    if (!isCorrectlyAnswered) {
                        setScore(prev => prev + 10);
                        setIsCorrectlyAnswered(true);
                    }
                } else if (isCorrectA) {
                    setFeedback({ isCorrect: false, msg: `(a) 答對了！但 (b) 錯了，應為 ${correctB}` });
                } else if (isCorrectB) {
                    setFeedback({ isCorrect: false, msg: `(b) 答對了！但 (a) 錯了，應為 ${correctA}` });
                } else {
                    setFeedback({ isCorrect: false, msg: `❌ 都錯了。正確: (a) ${correctA}, (b) ${correctB}` });
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 lg:p-8">
                    <div className="bg-white rounded-[2.5rem] p-6 lg:p-10 max-w-5xl w-full border-4 border-green-300 shadow-2xl flex flex-col">
                        
                        {/* 標題與分數區 */}
                        <div className="flex flex-col lg:flex-row items-center justify-between mb-8 lg:mb-10 w-full">
                            <div className="hidden lg:block lg:w-36"></div> {/* 左側留白保持平衡 */}
                            <div className="flex items-center justify-center space-x-4">
                                <span className="text-4xl lg:text-5xl">🚀</span>
                                <h1 className="text-3xl lg:text-5xl font-black text-gray-800 tracking-wide">小數點字卡排列</h1>
                                <span className="text-4xl lg:text-5xl">⭐</span>
                            </div>
                            <div className="mt-4 lg:mt-0 bg-yellow-400 text-yellow-900 font-black px-5 py-2 rounded-full shadow-md text-xl border-4 border-yellow-500 flex items-center justify-center whitespace-nowrap min-w-max">
                                🏆 <span className="tracking-wider ml-2">分數: {score}</span>
                            </div>
                        </div>
                        
                        {/* 橫向排版主要內容區 (iPad 橫向時會左右並排，嚴格 50:50) */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-10 items-stretch w-full">
                            
                            {/* 左側/上方：數字卡牌顯示區 */}
                            <div className="bg-green-50 rounded-3xl p-8 border-4 border-green-100 flex flex-col items-center justify-center shadow-inner">
                                <p className="text-xl lg:text-2xl mb-8 text-gray-700 font-bold text-center">用以下的數卡排出指定的小數：</p>
                                <div className="flex justify-center space-x-4 lg:space-x-6">
                                    {displayCards.map((item, idx) => (
                                        <div key={idx} className={`card w-16 h-24 lg:w-20 lg:h-28 bg-white border-4 border-green-500 rounded-2xl flex items-center justify-center text-4xl lg:text-5xl font-black text-gray-800 ${item === '.' ? 'pb-2 lg:pb-3' : ''}`}>
                                            {item}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* 右側/下方：問題與輸入區 */}
                            <div className="flex flex-col justify-center space-y-4">
                                
                                {/* 動態產生 (a) 和 (b) 兩題 */}
                                {questions.map((q) => (
                                    <div key={q.id} className="bg-blue-50 p-5 lg:p-6 rounded-3xl text-xl lg:text-2xl text-left border-4 border-blue-100 shadow-sm flex flex-col items-center justify-center">
                                        <label className="font-bold text-gray-700 flex flex-col lg:flex-row items-center text-center lg:text-left gap-4 w-full justify-center">
                                            <span className="leading-snug whitespace-nowrap">({q.id}) {q.size === 'max' ? '最大' : '最小'}的{q.decimal === 1 ? '一' : '兩'}位小數是：</span>
                                            <input 
                                                type="number" 
                                                value={userAnswers[q.id]}
                                                onChange={(e) => setUserAnswers({...userAnswers, [q.id]: e.target.value})}
                                                className="border-b-4 border-gray-400 bg-transparent outline-none text-center w-32 lg:w-36 font-black text-pink-500 text-3xl lg:text-4xl focus:border-pink-500 transition-colors pb-1"
                                                placeholder="?"
                                                onKeyPress={(e) => e.key === 'Enter' && checkAnswer()}
                                            />
                                        </label>
                                    </div>
                                ))}

                                {/* 回饋訊息 */}
                                <div className="h-16 flex items-center justify-center px-2 text-center">
                                    {feedback && (
                                        <div className={`text-xl lg:text-2xl font-black ${feedback.isCorrect ? 'text-green-500' : 'text-red-500'} animate-bounce`}>
                                            {feedback.msg}
                                        </div>
                                    )}
                                </div>

                                {/* 按鈕區 */}
                                <div className="flex justify-center space-x-4 lg:space-x-6">
                                    <button 
                                        onClick={checkAnswer}
                                        className="flex-1 bg-pink-400 hover:bg-pink-500 text-white font-bold py-4 lg:py-5 rounded-full shadow-lg transform transition active:scale-95 text-xl lg:text-2xl"
                                    >
                                        確定 ✔️
                                    </button>
                                    <button 
                                        onClick={generateQuestion}
                                        className="flex-1 bg-blue-400 hover:bg-blue-500 text-white font-bold py-4 lg:py-5 rounded-full shadow-lg transform transition active:scale-95 text-xl lg:text-2xl"
                                    >
                                        下一題 ➡️
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 將 App 渲染到畫面上
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
